<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - DUBEM</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --light: #ecf0f1; --whatsapp: #25d366; --destaque-laranja: #ff8c00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); margin: auto; }
        .header-logo { display: flex; justify-content: flex-start; margin-bottom: 20px; }
        .header-logo img { max-height: 80px; width: auto; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--light); padding-bottom: 10px; margin-top: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .grid-header { display: grid; grid-template-columns: 180px 200px 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: 600; font-size: 13px; margin-bottom: 5px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-right: 5px solid #ccc; border-radius: 8px 15px 15px 8px; font-size: 14px; outline: none; transition: all 0.3s ease; background: #fff; }
        input:focus, select:focus, textarea:focus { border-color: var(--destaque-laranja); border-right-color: var(--destaque-laranja); box-shadow: 0 0 8px rgba(255, 140, 0, 0.3); background: #fffdfa; transform: translateX(2px); }
        
        .quadros-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 25px 0; }
        .quadro { border: 1px solid #eee; border-top: 4px solid var(--destaque-laranja); padding: 15px; border-radius: 12px; background: #fafafa; border-right: 4px solid #ddd; }
        .quadro h4 { margin: 0 0 10px 0; color: var(--primary); text-align: center; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .medida-linha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .medida-linha input { width: 65px; text-align: center; padding: 6px; border-radius: 5px 10px 10px 5px; }
        
        .total-box { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: right; font-size: 20px; margin-bottom: 20px; border-right: 8px solid var(--destaque-laranja); }
        canvas#canvas-assinatura { border: 2px dashed #ccc; border-radius: 12px; background: #fff; cursor: crosshair; width: 100%; height: 100px; touch-action: none; }
        .buttons { display: flex; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
        button { flex: 1; min-width: 150px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: white; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        .btn-print { background: #34495e; color: white; }

        @media print { 
            .no-print, button, .limpar-btn, .financeiro-ocultar { display: none !important; } 
            .container { box-shadow: none; border: none; width: 100%; padding: 0; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-logo"><img src="https://iili.io/qdBJFiF.jpg" alt="Logo Estamparia"></div>
    <h2>Pedido Nº: <span id="display-numero">Buscando...</span></h2>
    
    <div class="grid-header">
        <div class="field"><label>Data</label><input type="text" id="data" class="mask-date"></div>
        <div class="field">
            <label>Atendente</label>
            <select id="atendente">
                <option value="">Selecione...</option>
                <option>Fernanda</option><option>Cláudia</option><option>Mayara</option>
            </select>
        </div>
        <div class="field"><label>Cliente</label><input type="text" id="cliente" placeholder="Nome completo"></div>
    </div>

    <div class="grid">
        <div class="field"><label>Produto</label><input type="text" id="produto" placeholder="Descrição detalhada do produto"></div>
        <div class="field"><label>Prev. Entrega</label><input type="text" id="prevEntrega" placeholder="Digite a previsão de entrega do produto"class="mask-date"></div>
    </div>

    <div class="grid financeiro-ocultar">
        <div class="field"><label>Valor Total</label><input type="text" id="valor" class="mask-money" oninput="calcAReceber()"></div>
        <div class="field"><label>Recebido</label><input type="text" id="recebido" class="mask-money" oninput="calcAReceber()"></div>
        <div class="field"><label>À Receber</label><input type="text" id="aReceber" class="mask-money" readonly></div>
        <div class="field"><label>Forma</label><select id="forma"><option value="">Selecione...</option><option>Dinheiro</option><option>Cartão</option><option>Pix</option></select></div>
    </div>

    <div class="grid">
        <div class="field"><label>Sublimação</label><select id="sublimacao"><option value="">Selecione...</option><option>A3</option><option>Total</option><option>Parcial</option><option>Sem Estampa</option><option>DTF</option></select></div>
        <div class="field"><label>Gola</label><select id="gola"><option value="">Selecione...</option><option>V</option><option>Redonda</option><option>Polo</option><option>Itapagé</option><option>Farda</option><option>Casaco</option><option>Alta</option></select></div>
        <div class="field"><label>Tecido</label><select id="tecido"><option value="">Selecione...</option><option>Algodão</option><option>Dry Falcom</option><option>Dry Elastano</option><option>Dry Sport</option><option>PP</option><option>PP Cor</option><option>PP Elastano</option><option>Piquê</option><option>Helanca</option><option>Helanquinha Lite</option><option>Helanca Colegial</option><option>Moletom</option><option>Tactel</option></select></div>
        <div class="field"><label>Corte</label><select id="corte"><option value="">Selecione...</option><option>Normal</option><option>Regata</option><option>Machão</option><option>Itapajé</option><option>Longa</option><option>Super Cavada</option></select></div>
        <div class="field"><label>Designer</label><select id="designer"><option value="">Selecione...</option><option>Pedro</option><option>Roger</option><option>Loja</option></select></div>
    </div>

    <div class="quadros-wrapper">
        <div class="quadro" data-categoria="Básicas">
            <h4>Básicas</h4>
            <div class="medida-linha">PP <input type="number" class="qtd" data-tam="PP"></div>
            <div class="medida-linha">P <input type="number" class="qtd" data-tam="P"></div>
            <div class="medida-linha">M <input type="number" class="qtd" data-tam="M"></div>
            <div class="medida-linha">G <input type="number" class="qtd" data-tam="G"></div>
            <div class="medida-linha">GG <input type="number" class="qtd" data-tam="GG"></div>
            <div class="medida-linha">EGG <input type="number" class="qtd" data-tam="EGG"></div>
        </div>

        <div class="quadro" data-categoria="Baby">
            <h4>Baby</h4>
            <div class="medida-linha">PP <input type="number" class="qtd" data-tam="PP"></div>
            <div class="medida-linha">P <input type="number" class="qtd" data-tam="P"></div>
            <div class="medida-linha">M <input type="number" class="qtd" data-tam="M"></div>
            <div class="medida-linha">G <input type="number" class="qtd" data-tam="G"></div>
            <div class="medida-linha">GG <input type="number" class="qtd" data-tam="GG"></div>
            <div class="medida-linha">EGG <input type="number" class="qtd" data-tam="EGG"></div>
        </div>

        <div class="quadro" data-categoria="Infantil">
            <h4>Infantil</h4>
            <div class="medida-linha">01 <input type="number" class="qtd" data-tam="01"></div>
            <div class="medida-linha">02 <input type="number" class="qtd" data-tam="02"></div>
            <div class="medida-linha">04 <input type="number" class="qtd" data-tam="04"></div>
            <div class="medida-linha">06 <input type="number" class="qtd" data-tam="06"></div>
            <div class="medida-linha">08 <input type="number" class="qtd" data-tam="08"></div>
            <div class="medida-linha">10 <input type="number" class="qtd" data-tam="10"></div>
            <div class="medida-linha">12 <input type="number" class="qtd" data-tam="12"></div>
        </div>
    </div>

    <div class="total-box">Quantidade Total: <span id="total-geral">0</span></div>

    <div class="grid">
        <div class="field"><label>Status</label><select id="status"><option>No Prazo</option></select></div>
        <div class="field"><label>Costura</label><select id="costura"><option value="">Selecione...</option><option>Clóvis</option><option>Gláucia</option></select></div>
        <div class="field"><label>Seção</label><select id="secao"><option>Estamparia</option></select></div>
        <div class="field"><label>Corte Gola</label><select id="corteGolaPrint"><option value="">Selecione...</option><option>Ribana</option><option>Polo</option><option>Viés 3cm</option><option>Viés 5cm</option><option>Itapajé 2</option><option>Itapajé 3</option><option>Outras</option><option>Alta</option></select></div>
        <div class="field"><label>Corte Manga</label><select id="corteMangaPrint"><option value="">Selecione...</option><option>Normal</option><option>Punho</option><option>S. Punho</option><option>Ribana</option><option>Viés</option></select></div>
    </div>

    <div class="field"><label>Observação</label><textarea id="observacao" rows="2"></textarea></div>

    <div class="field" style="margin-top:20px;">
        <label>Assinatura</label>
        <canvas id="canvas-assinatura"></canvas>
        <button type="button" class="no-print" onclick="limparAssinatura()" style="width:100px; margin-top:5px;">Limpar</button>
    </div>

    <div class="buttons no-print">
        <button class="btn-save" onclick="salvarDados()" id="btn-save">💾 Salvar Pedido</button>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">📱 WhatsApp</button>
        <button class="btn-print" onclick="imprimirComNome()">🖨️ Imprimir PDF</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyP6shqEkY-dqoAkZK_iM1K0oDd8KDGzMff02nKEQP_7k0nAHe2IIAu1Br0lK7L9xph/exec'; 

    function setHoje() {
        const hoje = new Date();
        const dd = String(hoje.getDate()).padStart(2, '0');
        const mm = String(hoje.getMonth() + 1).padStart(2, '0');
        const yyyy = hoje.getFullYear();
        document.getElementById('data').value = dd + '/' + mm + '/' + yyyy;
    }
    window.onload = () => { setHoje(); buscarNumeroPedido(); };

    const canvas = document.getElementById('canvas-assinatura');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    canvas.addEventListener('mousedown', () => drawing = true);
    window.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke();
    });
    function limparAssinatura() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function calcAReceber() {
        const parse = (id) => parseFloat(document.getElementById(id).value.replace(/\D/g, '')/100) || 0;
        const res = parse('valor') - parse('recebido');
        document.getElementById('aReceber').value = res.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    document.querySelectorAll('.mask-money').forEach(el => el.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'');
        e.target.value = (v/100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }));

    document.querySelectorAll('.mask-date').forEach(el => el.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'').slice(0, 8);
        if (v.length >= 5) v = v.replace(/(\d{2})(\d{2})(\d{0,4})/, "$1/$2/$3");
        else if (v.length >= 3) v = v.replace(/(\d{2})(\d{0,2})/, "$1/$2");
        e.target.value = v;
    }));

    document.querySelectorAll('.qtd').forEach(input => input.addEventListener('input', () => {
        let soma = 0; document.querySelectorAll('.qtd').forEach(i => soma += (parseInt(i.value) || 0));
        document.getElementById('total-geral').innerText = soma;
    }));

    // NOVA FUNÇÃO ENVIAR WHATSAPP
    function enviarWhatsApp() {
        const numPedido = document.getElementById('display-numero').innerText;
        const cliente = document.getElementById('cliente').value;
        const produto = document.getElementById('produto').value;
        const totalGeral = document.getElementById('total-geral').innerText;
        const valorTotal = document.getElementById('valor').value;
        const recebido = document.getElementById('recebido').value;
        const aReceber = document.getElementById('aReceber').value;
        const entrega = document.getElementById('prevEntrega').value;

        if (!cliente) { alert("Por favor, preencha o nome do cliente."); return; }

        let msg = `*Resumo do Pedido Nº ${numPedido}*\n`;
        msg += `*Cliente:* ${cliente}\n`;
        msg += `*Produto:* ${produto}\n\n`;
        msg += `*Tamanhos selecionados:*\n`;

        // Percorre os quadros para pegar tamanhos e quantidades
        document.querySelectorAll('.quadro').forEach(quadro => {
            const categoria = quadro.getAttribute('data-categoria');
            let itensCategoria = "";
            quadro.querySelectorAll('.qtd').forEach(input => {
                const qtd = parseInt(input.value);
                if (qtd > 0) {
                    itensCategoria += ` - ${input.getAttribute('data-tam')}: ${qtd}\n`;
                }
            });
            if (itensCategoria !== "") {
                msg += `_${categoria}:_\n${itensCategoria}`;
            }
        });

        msg += `\n*Qtd Total:* ${totalGeral} unidades\n`;
        msg += `--------------------------\n`;
        msg += `*Valor Total:* ${valorTotal}\n`;
        msg += `*Valor Pago:* ${recebido}\n`;
        msg += `*Valor à Pagar:* ${aReceber}\n`;
        msg += `*Previsão de Entrega:* ${entrega}\n\n`;
        msg += `_Obrigado pela preferência!_`;

        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
    }

    function imprimirComNome() {
        const num = document.getElementById('display-numero').innerText;
        const cli = document.getElementById('cliente').value || "Cliente";
        const des = document.getElementById('designer').value || "Sem_Designer";
        const originalTitle = document.title;
        document.title = `${num} - ${cli} - ${des}`;
        window.print();
        setTimeout(() => { document.title = originalTitle; }, 1000);
    }

    async function buscarNumeroPedido() {
        try {
            const response = await fetch(scriptURL + '?t=' + new Date().getTime());
            const num = await response.text();
            document.getElementById('display-numero').innerText = num;
        } catch (e) { document.getElementById('display-numero').innerText = "?"; }
    }

    async function salvarDados() {
    const btn = document.getElementById('btn-save');
    const dataAtual = document.getElementById('data').value;
    btn.disabled = true; 
    btn.innerText = "Salvando...";

    // Coleta a grade de tamanhos
    let detalhesTamanhos = [];
    document.querySelectorAll('.quadro').forEach(quadro => {
        const categoria = quadro.getAttribute('data-categoria');
        quadro.querySelectorAll('.qtd').forEach(input => {
            const qtd = parseInt(input.value);
            if (qtd > 0) {
                detalhesTamanhos.push({
                    categoria: categoria,
                    tamanho: input.getAttribute('data-tam'),
                    quantidade: qtd
                });
            }
        });
    });

    // MONTAGEM DO PACOTE DE DADOS (Verifique se os IDs no seu HTML batem com estes)
    const dados = {
        numero: document.getElementById('display-numero').innerText,
        data: dataAtual,
        cliente: document.getElementById('cliente').value,
        quantidadeTotal: document.getElementById('total-geral').innerText,
        valor: document.getElementById('valor').value,
        recebido: document.getElementById('recebido').value,
        aReceber: document.getElementById('aReceber').value,
        produto: document.getElementById('produto').value,
        sublimacao: document.getElementById('sublimacao').value,
        gola: document.getElementById('gola').value,
        tecido: document.getElementById('tecido').value,
        corte: document.getElementById('corte').value,
        designer: document.getElementById('designer').value,
        prevEntrega: document.getElementById('prevEntrega').value,
        status: document.getElementById('status').value,
        costura: document.getElementById('costura').value,
        secao: document.getElementById('secao').value,
        forma: document.getElementById('forma').value,
        // Usando os IDs específicos que você mencionou no histórico
        corteGola: document.getElementById('corteGolaPrint').value, 
        corteManga: document.getElementById('corteMangaPrint').value,
        observacao: document.getElementById('observacao').value,
        detalhesTamanhos: detalhesTamanhos
    };

    try {
        const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(dados) });
        if(response.ok) {
            alert('✅ Pedido ' + dados.numero + ' salvo com sucesso e TXT completo gerado!');
            
            // Limpa o formulário mantendo a data
            document.querySelectorAll('input:not(#data), select, textarea').forEach(el => el.value = "");
            document.querySelectorAll('.qtd').forEach(q => q.value = "");
            document.getElementById('total-geral').innerText = "0";
            
            // Atualiza para o próximo número
            buscarNumeroPedido(); 
        }
    } catch (e) {
        alert('Erro ao salvar. Verifique sua conexão.');
    } finally {
        btn.disabled = false;
        btn.innerText = "💾 Salvar Pedido";
    }
}
</script>
</body>
</html>
