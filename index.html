<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema DUBEM - Pedidos</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --whatsapp: #25d366; --destaque: #ff8c00; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; font-size: 13px; }
        .container { max-width: 1000px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); margin: auto; }
        .header-logo img { max-height: 70px; margin-bottom: 10px; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--light); padding-bottom: 10px; margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 10px; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        
        input, select, textarea { 
            padding: 8px; 
            border: 1px solid #000000; 
            border-radius: 5px; 
            outline: none; 
            font-size: 13px; 
            background: #fff; 
        }

        .quadros-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 15px 0; }
        .quadro { border: 1px solid #000; border-top: 4px solid var(--destaque); padding: 12px; border-radius: 8px; background: #fafafa; }
        .quadro h4 { margin: 0 0 10px 0; text-align: center; color: var(--primary); }
        .medida-linha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .medida-linha input { width: 50px; text-align: center; padding: 4px; border: 1px solid #000; }

        .total-box { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            text-align: left; 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px; 
            border-left: 6px solid var(--destaque); 
        }
        
        .signature-box { border: 2px dashed #000; background: #ffffff !important; border-radius: 10px; touch-action: none; margin-top: 5px; position: relative; }
        #canvas-assinatura { width: 100%; height: 160px; display: block; cursor: crosshair; }
        #assinatura-imagem { display: none; width: 100%; height: 160px; object-fit: contain; }

        .buttons { display: flex; gap: 8px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; font-size: 11px; }
        .btn-save { background: var(--accent); }
        .btn-wa { background: var(--whatsapp); }
        .btn-print { background: #34495e; }

        @media print { 
            .no-print { display: none !important; } 
            .container { box-shadow: none; width: 100%; padding: 0; border-radius: 0; }
            #canvas-assinatura { display: none !important; }
            #assinatura-imagem { display: block !important; }
            .signature-box { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<form id="formPedido">
<div class="container">
    <div class="header-logo"><img src="https://iili.io/qdBJFiF.jpg" alt="Logo"></div>
    <h2>Pedido Nº: <span id="display-numero">...</span></h2>

    <div class="grid">
        <div class="field"><label>Data Pedido</label><input type="text" id="data" readonly></div>
		<div class="field"><label>Atendente</label><select id="atendente"><option value="">Selecione...</option><option>Fernanda</option><option>Mayara</option><option>Cláudia</option><option>John</option><option>Pedro</option><option>Roger</option></select></div>
        <div class="field"><label>Cliente</label><input type="text" id="cliente" placeholder="Nome completo do cliente"></div>
        <div class="field"><label>Contato (WhatsApp)</label><input type="text" id="contato" placeholder="5511999999999"></div>
    </div>

    <div class="grid">
        <div class="field"><label>Produto</label><input type="text" id="produto" placeholder="Descrição detalhada do produto"></div>
        <div class="field"><label>Data Produção (+5d úteis)</label><input type="text" id="dataProducao" readonly></div>
        <div class="field"><label>Prev. Entrega (+15d úteis)</label><input type="text" id="prevEntrega"></div>
    </div>

    <div class="grid">
        <div class="field"><label>Sublimação</label><select id="sublimacao"><option value="">Selecione...</option><option>A3</option><option>Bordado</option><option>Total</option><option>Parcial</option><option>Sem Estampa</option><option>DTF</option></select></div>
        <div class="field"><label>Gola</label><select id="gola"><option value="">Selecione...</option><option>V</option><option>Redonda</option><option>Capuz</option><option>Polo</option><option>Itapagé</option><option>Farda</option><option>Casaco</option><option>Alta</option></select></div>
        <div class="field"><label>Tecido</label><select id="tecido"><option value="">Selecione...</option><option>Algodão</option><option>Dry Falcom</option><option>Dry Elastano</option><option>Dry Furado</option><option>Dry Sport</option><option>PP Aquarela</option><option>PP Cor</option><option>PP Elastano</option><option>Piquê</option><option>Helanca</option><option>Helanquinha Lite</option><option>Helanca Colegial</option><option>Moletom</option><option>Tactel</option></select></div>
        <div class="field"><label>Corte</label><select id="corte"><option value="">Selecione...</option><option>Normal</option><option>Regata</option><option>Machão</option><option>Itapajé</option><option>Longa</option><option>Super Cavada</option></select></div>
        <div class="field"><label>Designer</label><select id="designer"><option value="">Selecione...</option><option>Pedro</option><option>Roger</option><option>Loja</option></select></div>	
    </div>

    <div class="grid no-print" style="background: #fdfdfd; padding: 12px; border-radius: 8px; border: 1px solid #000;">
        <div class="field"><label>Valor Total</label><input type="text" id="valor" oninput="mascaraMoeda(this); calcFin()"></div>
        <div class="field"><label>Valor Recebido</label><input type="text" id="recebido" oninput="mascaraMoeda(this); calcFin()"></div>
        <div class="field"><label>À Receber</label><input type="text" id="aReceber" readonly style="background:#f0f0f0"></div>
        <div class="field"><label>Forma de Pagto</label><select id="forma"><option value="">Selecione...</option><option>Pix</option><option>Dinheiro</option><option>Cartão</option></select></div>
    </div>

    <div class="quadros-wrapper">
        <div class="quadro" data-categoria="Básicas">
            <h4>Básicas</h4>
           <div class="medida-linha">PP <input type="number" class="qtd" data-tam="PP"></div>
            <div class="medida-linha">P <input type="number" class="qtd" data-tam="P"></div>
            <div class="medida-linha">M <input type="number" class="qtd" data-tam="M"></div>
            <div class="medida-linha">G <input type="number" class="qtd" data-tam="G"></div>
            <div class="medida-linha">GG <input type="number" class="qtd" data-tam="GG"></div>
            <div class="medida-linha">EGG <input type="number" class="qtd" data-tam="EGG"></div>
        </div>
        <div class="quadro" data-categoria="Baby Look">
            <h4>Baby Look</h4>
            <div class="medida-linha">PP <input type="number" class="qtd" data-tam="PP"></div>
            <div class="medida-linha">P <input type="number" class="qtd" data-tam="P"></div>
            <div class="medida-linha">M <input type="number" class="qtd" data-tam="M"></div>
            <div class="medida-linha">G <input type="number" class="qtd" data-tam="G"></div>
            <div class="medida-linha">GG <input type="number" class="qtd" data-tam="GG"></div>
            <div class="medida-linha">EGG <input type="number" class="qtd" data-tam="EGG"></div>
        </div>
        <div class="quadro" data-categoria="Infantil">
            <h4>Infantil</h4>
            <div class="medida-linha">01 <input type="number" class="qtd" data-tam="01"></div>
            <div class="medida-linha">02 <input type="number" class="qtd" data-tam="02"></div>
            <div class="medida-linha">04 <input type="number" class="qtd" data-tam="04"></div>
            <div class="medida-linha">06 <input type="number" class="qtd" data-tam="06"></div>
            <div class="medida-linha">08 <input type="number" class="qtd" data-tam="08"></div>
            <div class="medida-linha">10 <input type="number" class="qtd" data-tam="10"></div>
            <div class="medida-linha">12 <input type="number" class="qtd" data-tam="12"></div>
        </div>
    </div>

    <div class="total-box">Quantidade Total: <span id="total-geral">0</span></div>

    <div class="grid">
        <div class="field"><label>Status</label><select id="status"><option>No Prazo</option></select></div>
        <div class="field"><label>Evento</label><select id="costura"><option value="">Selecione...</option><option>Evento</option></select></div>
        <div class="field"><label>Seção</label><select id="secao"><option>Estamparia</option></select></div>
        <div class="field"><label>Costura Gola</label><select id="corteGolaPrint"><option value="">Selecione...</option><option>Ribana</option><option>Polo</option><option>Viés 3cm</option><option>Viés 5cm</option><option>Itapajé 2</option><option>Itapajé 3</option><option>Outras</option><option>Alta</option></select></div>
        <div class="field"><label>Costura Manga</label><select id="corteMangaPrint"><option value="">Selecione...</option><option>Normal</option><option>Punho</option><option>S. Punho</option><option>Ribana</option><option>Viés</option></select></div>
    </div>

    <div class="field"><label>Observação</label><textarea id="observacao" rows="2"></textarea></div>

    <div style="margin-top:15px;">
        <label style="color:var(--destaque); font-size:11px">Assinatura do Cliente</label>
        <div class="signature-box">
            <canvas id="canvas-assinatura"></canvas>
            <img id="assinatura-imagem" alt="Assinatura">
        </div>
        <button type="button" class="no-print" onclick="limparAssinatura()" style="background:#e74c3c; color:white; padding:5px; margin-top:5px; border:none; border-radius:4px; cursor:pointer;">Limpar Assinatura</button>
    </div>

    <div class="buttons no-print">
        <button type="button" class="btn-save" onclick="salvarDados()" id="btn-save">💾 Salvar Pedido</button>
        <button type="button" class="btn-wa" onclick="enviarWhatsApp()">📱 WhatsApp</button>
        <button type="button" class="btn-print" onclick="gerarPDF()">🖨️ PDF</button>
    </div>
</div>
</form>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyEApXI6021RARCH9Hd9mdpty3NPkd6SwJoxTsPIDV__GBoouyfBlf8VjFyrEAHyn7pUQ/exec'; 

    const canvas = document.getElementById('canvas-assinatura');
    const ctx = canvas.getContext('2d');
    let desenhando = false;
    let jaAssinou = false; 

    function ajustarCanvas() {
        if (jaAssinou) return; 
        const r = canvas.getBoundingClientRect();
        canvas.width = r.width;
        canvas.height = r.height;
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - r.left, y: cy - r.top };
    }

    function start(e) { 
        desenhando = true; 
        jaAssinou = true; 
        const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); 
        if(e.touches) e.preventDefault(); 
    }
    function move(e) { 
        if(!desenhando) return; 
        const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); 
        if(e.touches) e.preventDefault(); 
    }
    function stop() { desenhando = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', stop);

    function limparAssinatura() { 
        ctx.clearRect(0,0,canvas.width,canvas.height); 
        jaAssinou = false; 
        document.getElementById('assinatura-imagem').src = "";
    }

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g, "");
        v = (v / 100).toFixed(2) + "";
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = "R$ " + v;
    }
    function calcFin() {
        const valRaw = document.getElementById('valor').value.replace("R$ ","").replace(/\./g,"").replace(",",".");
        const recRaw = document.getElementById('recebido').value.replace("R$ ","").replace(/\./g,"").replace(",",".");
        const t = parseFloat(valRaw) || 0;
        const r = parseFloat(recRaw) || 0;
        document.getElementById('aReceber').value = "R$ " + (t - r).toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    document.querySelectorAll('.qtd').forEach(i => i.addEventListener('input', () => {
        let s = 0; document.querySelectorAll('.qtd').forEach(q => s += (parseInt(q.value) || 0));
        document.getElementById('total-geral').innerText = s;
    }));

    function gerarPDF() {
        const imgAssinatura = document.getElementById('assinatura-imagem');
        if (jaAssinou) { try { imgAssinatura.src = canvas.toDataURL("image/png"); } catch(e) { imgAssinatura.src = ""; } }
        else { imgAssinatura.src = ""; }
        const num = document.getElementById('display-numero').innerText;
        const cli = document.getElementById('cliente').value || "Cli";
        const des = document.getElementById('designer').value || "Des";
        const originalTitle = document.title;
        document.title = `Pedido_${num}_${cli}_${des}`;
        window.print();
        setTimeout(() => { document.title = originalTitle; }, 1000);
    }

    function enviarWhatsApp() {
        const num = document.getElementById('display-numero').innerText;
        const cli = document.getElementById('cliente').value;
		const prod = document.getElementById('produto').value;
		const tec = document.getElementById('tecido').value;
        const dat = document.getElementById('data').value;
        const ent = document.getElementById('prevEntrega').value;
        const tot = document.getElementById('total-geral').innerText;
        const vT = document.getElementById('valor').value;
        const vR = document.getElementById('recebido').value;
        const vA = document.getElementById('aReceber').value;
        const fone = document.getElementById('contato').value.replace(/\D/g,"");

        if (!fone) { alert("Por favor, preencha o contato."); return; }

        let grade = "";
        document.querySelectorAll('.quadro').forEach(q => {
            let cat = q.querySelector('h4').innerText;
            let sub = "";
            q.querySelectorAll('.qtd').forEach(i => { 
                if(i.value > 0) sub += `\n   - ${i.getAttribute('data-tam')}: ${i.value}`; 
            });
            if(sub) grade += `\n*${cat}*${sub}`;
        });

        const msg = `*Obrigado por ter escolhido a Loja DUBEM!*

Segue dados do seu pedido:
*Nº do Pedido:* ${num}
*Cliente:* ${cli}
*Produto:* ${prod}
*Tecido:* ${tec}
*Data do Pedido:* ${dat}
*Prev. de Entrega:* ${ent}

*Grade de tamanhos:*${grade}

*Quantidade total:* ${tot}
*Valor Total:* ${vT}
*Valor Pago:* ${vR}
*Valor à Pagar:* ${vA}

*Obrigado pela preferência!*`;

        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`);
    }

    async function salvarDados() {
        // Validação dos campos obrigatórios
        const cliente = document.getElementById('cliente').value.trim();
        const produto = document.getElementById('produto').value.trim();
        const atendente = document.getElementById('atendente').value;
        if (!cliente || !produto || !atendente) {
            alert('⚠️ Preencha ao menos Cliente, Produto e Atendente antes de salvar.');
            return;
        }

        const btn = document.getElementById('btn-save'); 
        btn.disabled = true; btn.innerText = "Salvando...";
        
        let gradeArr = [];
        document.querySelectorAll('.qtd').forEach(i => {
            if(i.value > 0) gradeArr.push({ categoria: i.closest('.quadro').dataset.categoria, tamanho: i.dataset.tam, quantidade: i.value });
        });

        const dados = {
            numero: null, // Número gerado pelo servidor com lock (evita duplicidade)
            data: document.getElementById('data').value,
            cliente: document.getElementById('cliente').value,
            contato: document.getElementById('contato').value, // INFO ENVIADA PARA O DRIVE
            dataProducao: document.getElementById('dataProducao').value,
            prevEntrega: document.getElementById('prevEntrega').value,
            produto: document.getElementById('produto').value,
            sublimacao: document.getElementById('sublimacao').value,
            gola: document.getElementById('gola').value,
            tecido: document.getElementById('tecido').value,
            corte: document.getElementById('corte').value,
            designer: document.getElementById('designer').value,
            valor: document.getElementById('valor').value,
            recebido: document.getElementById('recebido').value,
            aReceber: document.getElementById('aReceber').value,
            forma: document.getElementById('forma').value,
            status: document.getElementById('status').value,
            costura: document.getElementById('costura').value,
            secao: document.getElementById('secao').value,
            corteGola: document.getElementById('corteGolaPrint').value,
            corteManga: document.getElementById('corteMangaPrint').value,
            observacao: document.getElementById('observacao').value,
            quantidadeTotal: document.getElementById('total-geral').innerText,
            detalhesTamanhos: gradeArr,
            atendente: document.getElementById('atendente').value,
            assinatura: (function() {
                const c = document.getElementById('canvas-assinatura');
                try { return c && c.width > 0 ? c.toDataURL('image/png') : ''; } catch(e) { return ''; }
            })()
        };

        try {
            const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(dados) });
            if (!response.ok) throw new Error('Servidor retornou erro: ' + response.status);
            const texto = await response.text();
            // Servidor retorna "Sucesso:NNN" onde NNN é o número gerado com lock
            if (texto && texto.startsWith('Erro')) throw new Error(texto);
            const numeroGerado = texto.includes(':') ? texto.split(':')[1].trim() : texto;
            alert('✅ Pedido Nº ' + numeroGerado + ' salvo com sucesso!');
            document.getElementById('formPedido').reset();
            limparAssinatura();
            document.getElementById('total-geral').innerText = "0";
            location.reload();
        } catch(e) { 
            alert('❌ Erro ao salvar: ' + e.message); 
            btn.disabled = false; 
            btn.innerText = "💾 Salvar Pedido"; 
        }
    }

    function adicionarDiasUteis(data, dias) {
        let dataFinal = new Date(data);
        let diasContados = 0;
        while (diasContados < dias) {
            dataFinal.setDate(dataFinal.getDate() + 1);
            let diaSemana = dataFinal.getDay();
            if (diaSemana !== 0 && diaSemana !== 6) {
                diasContados++;
            }
        }
        return dataFinal;
    }

    function inicializarDatas() {
        const hoje = new Date();
        const formatar = (d) => d.toLocaleDateString('pt-BR');
        document.getElementById('data').value = formatar(hoje);
        document.getElementById('dataProducao').value = formatar(adicionarDiasUteis(hoje, 5));
        document.getElementById('prevEntrega').value = formatar(adicionarDiasUteis(hoje, 15));
        fetch(scriptURL).then(r => r.text()).then(t => document.getElementById('display-numero').innerText = t);
    }

    window.onload = () => {
        inicializarDatas();
        ajustarCanvas();
        window.addEventListener('resize', ajustarCanvas);
    };
</script>
</body>
</html>
